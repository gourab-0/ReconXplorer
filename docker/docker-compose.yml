services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    volumes:
      - ../frontend/dashboard:/app
      - /app/node_modules
    env_file:
      - ../frontend/dashboard/.env.local
    depends_on:
      - backend

  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin
    ports:
      - "3001:3001"
    volumes:
      - ../frontend/admin:/app
      - /app/node_modules
    env_file:
      - ../frontend/admin/.env
    depends_on:
      - backend

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend/app:/app/app
    environment:
      - DATABASE_URL=postgresql://postgres:Gourab_2026@host.docker.internal:5432/reconxplorer
    env_file:
      - ../backend/.env
